# Hugo configuration file
title: docs.webtool.app
baseURL: https://docs.webtool.app
languageCode: en-us

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: OCR 
      pageRef: /ocr
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4 
      url: "https://github.com/socrabytes/webtool-docs"
      params:
        icon: github

  sidebar:
    - name: Tools
      params:
        type: separator
      weight: 1
    - name: "ocr.webtool.app ↗"
      url: "https://ocr.webtool.app"
      weight: 2        
params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/socrabytes/webtool-docs/edit/main/content"

  sidebar:
    displaySectionTitle: true
